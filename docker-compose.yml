# 本地开发配置文件 - 组员在各自电脑上运行
# 启动命令: docker-compose up -d

version: '3.8'

services:
  # 后端服务
  backend:
    image: ${DOCKER_REGISTRY:-docker.io}/library/maven:3.9.6-eclipse-temurin-17-alpine
    container_name: mikmok-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2 # 挂载本地 maven 仓库加速
    # 开发模式直接使用 maven 运行源码
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${SERVER_IP}:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_REDIS_HOST=${SERVER_IP}
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD}
      - MINIO_ENDPOINT=http://${SERVER_IP}:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}

  # 前端服务
  frontend:
    image: ${DOCKER_REGISTRY:-docker.io}/library/node:20-alpine
    container_name: mikmok-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules # 匿名卷，防止本地 node_modules 覆盖容器内的
    # 开发模式使用 node 镜像运行 npm
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    stdin_open: true
    tty: true

  # Nginx 反向代理 (可选，用于模拟生产环境)
  nginx:
    image: nginx:alpine
    container_name: mikmok-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
      - frontend
