spring:
  application:
    name: mikmok-backend

  jackson:
    time-zone: Asia/Shanghai

  servlet:
    multipart:
      max-file-size: 150MB
      max-request-size: 150MB

  datasource:
    url: jdbc:postgresql://${SERVER_IP:localhost}:5432/${DB_NAME:mikmok}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai

  data:
    redis:
      host: ${SERVER_IP:localhost}
      port: 6379
      password: ${REDIS_PASSWORD}

minio:
  endpoint: http://${SERVER_IP:localhost}:9000
  accessKey: ${MINIO_ROOT_USER}
  secretKey: ${MINIO_ROOT_PASSWORD}
  bucketName: videos

logging:
  level:
    com.mikmok.backend: DEBUG
    org.springframework.web: INFO
